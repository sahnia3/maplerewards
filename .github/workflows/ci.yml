name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: backend (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

      - name: go build
        run: go build -v ./...

      - name: go test (race detector)
        run: go test -race -count=1 ./...

      # Security-perimeter coverage floor (LAUNCH-ISSUES.md P0-5): green CI
      # must mean "secure", not just "compiles". internal/middleware holds
      # CSRF / IDOR (ownership) / RequirePro / admin / per-user rate-limit;
      # this trips if that coverage regresses (e.g. the perimeter tests are
      # deleted/broken). 55% is comfortably met today and brittleness-low.
      - name: security perimeter coverage floor
        run: |
          go test -covermode=atomic -coverprofile=mw.cover ./internal/middleware/... >/dev/null
          pct=$(go tool cover -func=mw.cover | awk '/^total:/{gsub("%","",$3); print $3}')
          echo "internal/middleware coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{ if (p+0 < 55.0) { print "FAIL: security-perimeter coverage " p "% < 55% floor"; exit 1 } }'

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

  docker:
    name: docker build verification
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: maplerewards-api:ci

      - name: smoke check image (binary exists, no root)
        run: |
          docker image inspect maplerewards-api:ci > /dev/null
          # Confirm the image runs as a non-root user (matches Dockerfile USER 10001).
          USER_FIELD=$(docker image inspect -f '{{.Config.User}}' maplerewards-api:ci)
          if [ "$USER_FIELD" != "10001:10001" ]; then
            echo "Dockerfile must drop to USER 10001:10001 — got '$USER_FIELD'"
            exit 1
          fi

  frontend:
    name: frontend (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    strategy:
      matrix:
        node: ['20']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: lint
        run: npm run lint

      - name: build (production)
        run: npm run build

      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
