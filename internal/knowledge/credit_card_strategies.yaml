# ── BOOKING WALKTHROUGHS ─────────────────────────────────────────────────
# Step-by-step booking guides for the highest-CPP redemption sweet spots
# Canadians can hit from YYZ / YVR / YUL. The AI surfaces these verbatim
# when users ask "how do I book X" — prevents hallucinated booking flows.

walkthroughs:
  - id: aeroplan-ana-business-yyz-hnd
    title: "Booking ANA business class YYZ→HND with Aeroplan"
    steps:
      - "Confirm you have 75K Aeroplan in account (or 75K Amex MR ready to transfer 1:1, instant)"
      - "Search aircanada.com → Aeroplan flight rewards → enter YYZ-HND, 9-11 months out"
      - "Toggle 'Show all carriers'; look for ANA NH002 or NH001 in J cabin"
      - "Taxes: ~$220 CAD outbound. Pay with travel-credit card for trip protection."
      - "If no ANA space: try EVA BR012 (similar TPAC J cost), or split via NRT on UA"

  - id: aeroplan-lufthansa-business-yyz-fra
    title: "Booking Lufthansa business class YYZ→FRA with Aeroplan"
    steps:
      - "Confirm 75K Aeroplan in account (post-June 2026 chart; previously 60K-70K)"
      - "Search aircanada.com → Aeroplan rewards → YYZ-FRA, cabin business, ~330 days out"
      - "Lufthansa releases long-haul J only ~15 days before departure for non-status; status holders see space earlier"
      - "Taxes: ~$165 CAD outbound from Canada (much higher returning from Germany due to fees)"
      - "Better alternative if no LH space: Swiss LX87 via ZRH or Brussels SN552 via BRU — same cost"

  - id: aeroplan-swiss-business-yul-zrh
    title: "Booking Swiss business class YUL→ZRH with Aeroplan"
    steps:
      - "75K Aeroplan required (long-haul Atlantic J)"
      - "Open aircanada.com → Aeroplan flight rewards → YUL-ZRH, business class"
      - "Look for LX87 (overnight to Zurich); Swiss is generous with J space 330+ days out"
      - "Taxes: ~$135 CAD outbound from Montreal"
      - "Pro move: add a Europe stopover for 5K extra pts — open jaw via VIE or AMS"

  - id: avios-aa-shorthaul-yyz-jfk
    title: "Booking AA short-haul YYZ→JFK with British Airways Avios"
    steps:
      - "9,000 Avios + ~$15 USD taxes (vs ~$200 cash) — best CPP redemption from Canada"
      - "ba.com → Manage > Avios → Spend Avios → Book flights → search YYZ-JFK"
      - "Filter to American Airlines metal in 'Show partner airlines'"
      - "AA releases saver-level space 11 months out; refresh daily for premium dates"
      - "Transfer Amex MR or RBC Avion at 1:1 to BA Executive Club if balance short — completes in 24-36h"

  - id: hyatt-cash-points-park-hyatt-tokyo
    title: "Booking Park Hyatt Tokyo with World of Hyatt cash + points"
    steps:
      - "Cash+Points rate: 12,500 Hyatt pts + ~$300 USD/nt (vs ~$900 cash)"
      - "hyatt.com → Search Park Hyatt Tokyo → toggle 'Use points' → select Cash + Points option"
      - "Confirm rate before redeeming — Hyatt offers both points-only (40K) and cash+points; cash+points often better value at top properties"
      - "Transfer in via Chase Sapphire UR (US only) or Amex Bonvoy → Hyatt at terrible 2.5:1 (avoid)"
      - "Canadian path: buy Hyatt points during their 30% bonus sales (~1.7¢/pt cost), still 3¢+ CPP at Park Hyatt"

  - id: flying-blue-promo-yyz-cdg
    title: "Catching a Flying Blue Promo Award YYZ→CDG"
    steps:
      - "Subscribe to flyingblue.com Promo Awards email (first Tuesday of each month)"
      - "Look for transatlantic discounts: typically 25-50% off normal 70K J / 35K Y rates"
      - "If a YYZ→CDG promo hits at ~40K J, transfer Amex MR → Flying Blue 1:1 (instant)"
      - "Book within the promo window (usually 7-30 days); promo applies to travel within ~3 months"
      - "Taxes from Canada are reasonable (~$170 CAD outbound); avoid CDG returns due to high French fees"

  - id: alaska-jal-business-yvr-hnd
    title: "Booking Japan Airlines business YVR→HND via Alaska Mileage Plan"
    steps:
      - "Note: Alaska MP transfer partners in Canada are limited — Marriott Bonvoy 3:1 with 5K bonus per 60K"
      - "JAL J on Alaska award chart: 60K MP miles + ~$30 taxes (extraordinary value)"
      - "alaskaair.com → Use miles → search YVR-HND → filter partner airlines, find JAL JL19/JL21"
      - "JAL releases J space at 360 days out; 1 day before departure also sees release"
      - "If MP balance short: Marriott 240K Bonvoy → 100K Alaska (with 60K bonus from 3 transfers of 60K)"

  - id: avianca-lifemiles-united-business-yyz-bog
    title: "Booking United business YYZ→BOG via Avianca LifeMiles"
    steps:
      - "63K LifeMiles + ~$70 USD taxes for Star Alliance J YYZ-BOG (vs Aeroplan's 75K+ post-June 2026)"
      - "LifeMiles regularly runs 30-50% buy-points sales — cost basis ~1.3¢/mile"
      - "lifemiles.com → Redeem → enter route → choose United metal in J cabin"
      - "Pay attention: LifeMiles search is fragmented — search each leg separately if multi-segment"
      - "Avoid YYZ-BOG with one stop via PTY (Copa) — taxes triple. Direct UA metal is the play."

  - id: aeroplan-singapore-suites-yyz-sin
    title: "Booking Singapore Airlines Suites YYZ→SIN with Aeroplan"
    steps:
      - "90K Aeroplan + ~$280 CAD for First/Suites class via SIN partner award"
      - "Singapore Suites SQ22 (EWR-SIN, world's longest flight) bookable via Aeroplan as Star Alliance partner"
      - "From YYZ: positioning to EWR on Star Alliance economy adds ~7.5K Aeroplan"
      - "Singapore releases Suites space 355 days out; refresh hourly day-of for premium routes"
      - "Pro tip: Singapore is NOTORIOUSLY tight with Suites partner space — flexibility on dates is mandatory"

  - id: aeroplan-stopover-yyz-asia
