# ── STRATEGY PRINCIPLES ───────────────────────────────────────────────────

strategy_principles:

  card_count:
    rule: "Max 3-4 cards, no more"
    reasoning: "More cards means diluted spend, harder to track, and more fees"

  network_coverage:
    rule: "One card from each major network (Visa, Mastercard, Amex)"
    reasoning: "Amex not accepted everywhere; Visa/MC provide backup coverage especially internationally"

  card_roles:
    main_driver:
      description: "Highest multiplier card where most spend goes"
      purpose: "Accumulate the most points/cashback per dollar"
      examples: ["Amex Cobalt (5x food)", "RBC ION+ (3x everyday)", "Scotia Gold Amex (6x Sobeys)"]
    benefits_card:
      description: "Card that provides travel insurance, lounge passes, credits"
      purpose: "Justify annual fee through insurance value and perks, not earning rate"
      examples: ["RBC Avion VI", "Scotia Passport VI", "TD Aeroplan VI"]
    backup_card:
      description: "Card for network coverage or specific bonus categories"
      purpose: "Fill gaps where main driver is not accepted or does not earn well"
      examples: ["Rogers Red WE MC", "EQ Bank Prepaid MC"]

  annual_fee_justification:
    rule: "Do not pay annual fees you cannot justify"
    tips:
      - "Calculate value of lounge passes, insurance, travel credits, and earn rate"
      - "If total perk value exceeds the annual fee, the card is worth keeping"
      - "Conduct annual credit card audit to check if benefits are exhausted"
      - "Cancel or product-switch cards whose benefits you no longer use"

  product_switching:
    rule: "Product switch free student cards to premium cards once credit limit hits $5k"
    tips:
      - "Keep existing credit history by switching rather than opening new accounts"
      - "Most banks allow product switch without a new credit inquiry"
      - "Student cards often convert to premium tier at same bank once eligible"

  partner_strategy:
    rule: "Split cards between partners — do not duplicate the same card"
    tips:
      - "Each partner holds different cards to maximize network and earn coverage"
      - "One partner can hold Amex cards, other holds Visa/MC"
      - "Pool points via shared loyalty accounts where possible"

  credit_score_optimization:
    pay_statement_balance: "Pay the statement balance (not current balance) by the due date"
    utilization_target: "Keep credit utilization between 1-5% for the best credit score impact"
    utilization_note: "Utilization is calculated at statement date — pay down before statement closes if needed"

  student_strategy:
    step_1: "Start with 1 credit card at your existing bank"
    step_2: "Build credit history for 6-12 months before applying for additional cards"
    step_3: "Once credit limit reaches $5k, product switch to a premium card"
    step_4: "Do not apply for multiple cards at once — space applications 3-6 months apart"

